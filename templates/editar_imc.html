<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar IMC</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d9efff, #f4fbff);
        }

        nav {
            background-color: #1e88c8;
            color: white;
            padding: 18px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        nav h2 {
            margin: 0;
            font-size: 28px;
        }

        .card {
            background-color: white;
            width: 430px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.18);
            text-align: center;
        }

        .emoji {
            font-size: 48px;
            background-color: #e3f4ff;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: auto;
        }

        h1 {
            color: #1e88c8;
            margin-bottom: 5px;
        }

        .texto {
            color: #555;
            font-size: 15px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #b8d8ee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #1e88c8;
            box-shadow: 0 0 5px #9ed7ff;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 13px;
            background-color: #1e88c8;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background-color: #166999;
        }

        .volver {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #1e88c8;
            text-decoration: none;
            font-weight: bold;
        }

        .volver:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <nav>
        <h2>Editar registro IMC</h2>
    </nav>

    <div class="card">

        <div class="emoji">✏️</div>

        <h1>Editar datos</h1>

        <p class="texto">
            Cambia el nombre, peso o altura. El IMC se calculará otra vez automáticamente.
        </p>

        <form method="POST">
            <label>Nombre:</label>
            <input type="text" name="nombre" value="{{ registro.nombre }}" required>

            <label>Peso en kg:</label>
            <input type="number" step="0.01" name="peso" value="{{ registro.peso }}" required>

            <label>Altura en metros:</label>
            <input type="number" step="0.01" name="altura" value="{{ registro.altura }}" required>

            <button type="submit">Guardar cambios</button>
        </form>

        <a class="volver" href="{{ url_for('imc') }}">Cancelar y volver</a>

    </div>

</body>
</html>
